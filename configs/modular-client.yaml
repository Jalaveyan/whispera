# Whispera Modular Client Configuration
version: "2.0"

# Main client settings
client:
  mode: "vpn" # vpn, proxy
  log_level: "info"

# Connection to server
connection:
  server_address: "vpn.example.com:443"
  transport: "udp" # udp, tcp, xhttp, ws
  keepalive_interval: 30s
  reconnect_interval: 5s
  max_reconnect_attempts: 10
  timeout: 30s

# TUN Interface settings
tun:
  enabled: true
  name: "whispera0"
  ip: "10.8.0.2"
  gateway: "10.8.0.1"
  netmask: "255.255.255.0"
  mtu: 1420
  buffer_size: 65535
  metric: 100

# DNS settings
dns:
  enabled: true
  upstream: "1.1.1.1:53"
  fake_ip: true
  fake_ip_range: "198.18.0.0/15"
  cache_size: 10000
  block_ads: true

# NAT / Routing
nat:
  enabled: true
  port_range_start: 10000
  port_range_end: 20000

# Security
crypto:
  cipher: "chacha20-poly1305"
  enable_key_pool: true

# Obfuscation
obfuscator:
  enabled: true
  profile: "randomized"
  threat_level: 5

# Metrics
metrics:
  enabled: true
  address: ":9091"
  path: "/metrics"

# ASN Bypass - for VPN/Datacenter IP detection evasion
# Enable this if connections are blocked immediately after TLS ClientHello
# due to the source IP being from a VPN/datacenter ASN
asn_bypass:
  enabled: false  # Set to true if experiencing ASN-based blocking
  strategy: "tls_masquerade"  # direct, tls_masquerade, domain_fronting, residential_proxy, websocket, grpc
  tls_fingerprint: "chrome"   # Browser fingerprint: chrome, firefox, safari, ios, android, edge, 360, qq
  
  # Domain fronting (optional) - connect to CDN, send real Host header
  # front_host: "ajax.cloudflare.com"
  
  # Residential proxies (optional) - route through residential IPs first
  # residential_proxies:
  #   - "socks5://user:pass@residential-proxy.com:1080"
  #   - "http://user:pass@another-proxy.com:8080"
  # proxy_rotation: true
  
  # Advanced options
  ja3_randomize: true      # Randomize JA3 fingerprint per connection
  enable_ech: false        # Enable Encrypted Client Hello (when available)
  connection_burst: 5      # Max connections per burst window
  burst_cooldown_ms: 2000  # Cooldown between bursts
